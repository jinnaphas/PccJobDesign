<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Role Library — PCC People</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  .layout{display:flex;gap:0;align-items:flex-start}
  .side{width:240px;flex-shrink:0;background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:14px;position:sticky;top:64px;max-height:calc(100vh - 80px);overflow:auto}
  .side h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:14px 0 6px}
  .side h4:first-child{margin-top:0}
  .main{flex:1;min-width:0;padding-left:16px}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .toolbar .txt{flex:1;min-width:160px}
  .legend{display:flex;gap:5px;flex-wrap:wrap;margin:0 0 12px}
  .legend span{font-size:10.5px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .afilters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .afilters .af{background:#eaf1fb;border:1px solid #cfe0f5;color:var(--blue);font-size:11px;border-radius:12px;padding:3px 8px;cursor:pointer}
  .filterbtn{display:none}
  @media(max-width:760px){
    .filterbtn{display:inline-flex}
    .side{position:fixed;left:0;top:0;bottom:0;z-index:50;border-radius:0;width:280px;max-width:85vw;transform:translateX(-105%);transition:.2s;max-height:none}
    .side.open{transform:none;box-shadow:var(--shadow)}
    .main{padding-left:0}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;display:none}.scrim.on{display:block}
  }
</style>
</head>
<body>
<div id="nav"></div>
<div class="wrap">
  <div class="toolbar no-print">
    <button class="btn sm filterbtn" onclick="drawer(true)">☰ <span id="t-filters"></span></button>
    <input class="txt" id="q" placeholder="" autocomplete="off">
    <select id="sort"></select>
    <span class="muted" style="font-size:12.5px"><b id="shown" style="color:var(--navy)">0</b>/<span id="total">0</span> <span id="t-results"></span></span>
  </div>
  <div class="legend no-print" id="legend"></div>
  <div id="afilters" class="afilters no-print"></div>
  <div class="layout">
    <div class="side no-print" id="side">
      <h4 id="t-company"></h4><div id="f-co"></div>
      <h4 id="t-level"></h4><div id="f-lv"></div>
      <h4 id="t-family"></h4><div id="f-fam"></div>
      <div style="margin-top:14px"><span class="chip" onclick="resetF()">↺ <span id="t-reset"></span></span></div>
    </div>
    <div class="main"><div class="grid" id="grid"></div></div>
  </div>
</div>
<div class="scrim" id="scrim" onclick="drawer(false)"></div>
<div class="ov" id="ov" onclick="if(event.target===this)this.classList.remove('show')"><div class="mod" id="mod"></div></div>
<footer>PCC Group · Job Role Library · <span id="ftnote"></span></footer>

<script src="shared.js"></script>
<script>
let REF,ROLES,DIMS,sel={co:new Set(),lv:new Set(),fam:new Set()},chart;
const $=id=>document.getElementById(id);
function drawer(o){$('side').classList.toggle('open',o);$('scrim').classList.toggle('on',o);}

async function boot(){
  PCC.nav('library');
  // static labels
  $('t-filters').textContent=PCC.t('filters');$('t-results').textContent=PCC.t('results');
  $('t-company').textContent=PCC.t('company');$('t-level').textContent=PCC.t('level');$('t-family').textContent=PCC.t('family');
  $('t-reset').textContent=PCC.t('reset');$('q').placeholder=PCC.t('search');
  const so=$('sort');[['je_desc','sortJEdesc'],['je_asc','sortJEasc'],['title','sortTitle'],['level','sortLevel']].forEach(([v,k])=>{const o=document.createElement('option');o.value=v;o.textContent=PCC.t(k);so.appendChild(o);});
  try{
    REF=await PCC.ref();
    ROLES=(await (await fetch('../data/job_roles.json')).json()).roles.filter(r=>r.status==='active');
    DIMS=REF.je_framework.dimensions;
  }catch(e){$('grid').innerHTML=PCC.needLiveMsg();return;}
  $('total').textContent=ROLES.length;
  $('ftnote').textContent=ROLES.length+' active roles · data v1';
  // legend
  $('legend').innerHTML=PCC.LEVELS.map(l=>`<span><i style="background:${PCC.LC[l]}"></i>${l}</span>`).join('')
    +' &nbsp; <span class="trust ok" style="font-size:10px">✓ '+PCC.t('je_ok')+'</span> <span class="trust rev" style="font-size:10px">⏳ '+PCC.t('je_rev')+'</span>';
  // filters
  REF.companies.forEach(c=>$('f-co').appendChild(chip('co',c.code,c.code)));
  PCC.LEVELS.forEach(l=>$('f-lv').appendChild(chip('lv',l,l)));
  REF.consolidated_families.forEach(f=>$('f-fam').appendChild(chip('fam',f.id,f.icon+' '+f.name_en)));
  $('q').addEventListener('input',PCC.debounce(render,180));
  $('sort').addEventListener('change',render);
  const q=PCC.qs('q'); if(q)$('q').value=q;
  render();
  const role=PCC.qs('role'); if(role){const r=ROLES.find(x=>x.code===role); if(r)openMod(r);}
}
function chip(facet,val,label){const s=document.createElement('span');s.className='chip';s.dataset.f=facet;s.dataset.v=val;
  s.innerHTML=`<span>${label}</span> <span class="cnt"></span>`;s.onclick=()=>{sel[facet].has(val)?sel[facet].delete(val):sel[facet].add(val);render();};return s;}
function resetF(){sel={co:new Set(),lv:new Set(),fam:new Set()};$('q').value='';render();}

function passes(r,skip){
  const q=$('q').value.trim().toLowerCase();
  if(skip!=='co'&&sel.co.size&&!sel.co.has(r.company))return false;
  if(skip!=='lv'&&sel.lv.size&&!sel.lv.has(r.level))return false;
  if(skip!=='fam'&&sel.fam.size&&!sel.fam.has(PCC.famId(r)))return false;
  if(skip!=='q'&&q&&!((r.code+' '+(r.title_en||'')+' '+(r.title_th||'')).toLowerCase().includes(q)))return false;
  return true;
}
function render(){
  const q=$('q').value.trim().toLowerCase();
  // chip counts + active state
  document.querySelectorAll('.chip[data-f]').forEach(c=>{
    const f=c.dataset.f,v=c.dataset.v;
    c.classList.toggle('on',sel[f].has(v));
    const n=ROLES.filter(r=>passes(r,f) && (f==='fam'?PCC.famId(r)===v:r[f==='co'?'company':'level']===v)).length;
    c.querySelector('.cnt').textContent=n;
  });
  // active filter chips
  const af=[];
  sel.co.forEach(v=>af.push(['co',v,v])); sel.lv.forEach(v=>af.push(['lv',v,v])); sel.fam.forEach(v=>af.push(['fam',v,PCC.famName(v)]));
  $('afilters').innerHTML = af.length? af.map(([f,v,l])=>`<span class="af" onclick="sel.${f}.delete('${v}');render()">${l} ✕</span>`).join('')+`<span class="af" style="background:#fdecea;border-color:#f1b0a8;color:var(--crit)" onclick="resetF()">${PCC.t('clearAll')} ✕</span>` : '';
  // filter + sort
  let list=ROLES.filter(r=>passes(r));
  const s=$('sort').value;
  list.sort((a,b)=> s==='je_desc'?(b.je_score-a.je_score) : s==='je_asc'?(a.je_score-b.je_score) : s==='title'?PCC.title(a).localeCompare(PCC.title(b)) : (PCC.LEVELS.indexOf(a.level)-PCC.LEVELS.indexOf(b.level)|| a.code.localeCompare(b.code)));
  const g=$('grid');g.innerHTML='';
  list.forEach(r=>{
    const t=PCC.jeTrust(r);
    const card=document.createElement('div');card.className='rc';card.style.borderLeftColor=PCC.coColor(r.company);
    card.innerHTML=`<div class="t">${PCC.hl(PCC.title(r),q)}</div><div class="c mono">${PCC.hl(r.code,q)}</div>
      <div class="m"><span class="lvl" style="background:${PCC.LC[r.level]}">${r.level}</span>
      <span class="muted" style="font-size:11px">JE <b style="color:var(--text)">${r.je_score??'—'}</b></span>
      <span class="trust ${t.cls}">${t.icon}</span></div>`;
    card.onclick=()=>openMod(r);g.appendChild(card);
  });
  $('shown').textContent=list.length;
}

function openMod(r){
  drawer(false);
  const co=PCC.coColor(r.company), t=PCC.jeTrust(r);
  let h=`<div class="mh" style="background:${co}"><button class="close" onclick="$('ov').classList.remove('show')">×</button>
    <div class="code mono">${r.code} · ${PCC.coName(r.company)}</div><h2>${PCC.title(r)}</h2>
    <div style="opacity:.92;font-size:12.5px">${PCC.lang()==='th'?(r.title_en||''):(r.title_th||'')}</div></div><div class="mb">`;
  (r.data_quality||[]).forEach(f=>h+=`<div class="warn ${f.severity==='critical'?'crit':''}">${f.severity==='critical'?'🔴':'⚠️'} ${PCC.esc(f.message)}</div>`);
  h+=`<div class="row no-print" style="margin-bottom:6px">
     <a class="btn sm" href="career.html?family=${PCC.famId(r)}&company=${r.company}">🪜 ${PCC.t('viewCareer')}</a>
     <a class="btn sm" href="evaluate.html?target=${encodeURIComponent(r.code)}">🎯 ${PCC.t('doEval')}</a>
     <button class="btn sm" onclick="window.print()">🖨️ ${PCC.t('print')}</button></div>`;
  h+=`<div class="row" style="gap:18px;align-items:center">
       <div style="text-align:center"><div style="font-size:30px;font-weight:800;color:${PCC.LC[r.level]}">${r.je_score??'—'}</div>
       <div class="muted" style="font-size:11px">${PCC.t('jescore')}</div><span class="trust ${t.cls}">${t.icon} ${t.label}</span></div>
       <div style="flex:1;max-width:230px"><canvas id="jechart" height="150"></canvas></div></div>`;
  h+=`<div style="margin-top:8px"><span class="tag">${r.level}</span><span class="tag">${PCC.famName(PCC.famId(r))}</span>${r.unit_type?`<span class="tag">${r.unit_type}</span>`:''}${r.report_to?`<span class="tag">↑ ${PCC.esc(r.report_to)}</span>`:''}</div>`;
  if(r.purpose_th)h+=`<h3>${PCC.t('purpose')}</h3><div style="font-size:13px">${PCC.esc(r.purpose_th)}</div>`;
  if(r.krs&&r.krs.length){h+=`<h3>${PCC.t('krs')}</h3>`;r.krs.forEach(k=>{h+=`<div class="kr"><span class="kw">${k.weight_pct??''}%</span><div class="kt">${PCC.esc(k.name_th||k.name_en||'')}</div>${(k.kpis||[]).length?`<div class="kp">KPI: ${k.kpis.map(PCC.esc).join(' · ')}</div>`:''}</div>`;});}
  if(r.specs){const s=r.specs;h+=`<h3>${PCC.t('specs')}</h3>`;
    if(s.education)h+=`<span class="tag">🎓 ${PCC.esc((s.education.level||'')+' '+(s.education.field||''))}</span>`;
    if(s.experience)h+=`<span class="tag">💼 ${PCC.esc((s.experience.min_years??'')+'+ ปี')}</span>`;
    if(s.languages&&s.languages.english)h+=`<span class="tag">🌐 EN: ${s.languages.english}</span>`;
    (s.skills||[]).forEach(x=>h+=`<span class="tag">🔧 ${PCC.esc(x)}</span>`);
    (s.digital||[]).forEach(x=>h+=`<span class="tag">💻 ${PCC.esc(x)}</span>`);
    (s.certs||[]).forEach(x=>h+=`<span class="tag">📜 ${PCC.esc(x)}</span>`);}
  if(r.market_benchmark&&r.market_benchmark.salary_range_thb)h+=`<h3>Market</h3><div style="font-size:12.5px">${PCC.esc(r.market_benchmark.comparable_titles||'')}<br><b>${PCC.esc(r.market_benchmark.salary_range_thb)}</b></div>`;
  h+=`<div class="mono" style="font-size:10.5px;color:#aab; margin-top:12px">${PCC.esc(r.source_docx||'')}</div></div>`;
  $('mod').innerHTML=h;$('ov').classList.add('show');
  if(chart)chart.destroy();
  if(typeof Chart==='undefined'){const c=$('jechart');if(c)c.replaceWith(Object.assign(document.createElement('div'),{className:'muted',style:'font-size:11px',textContent:'(chart offline)'}));}
  else if(r.je_breakdown){
    const grp={};DIMS.forEach((d,i)=>{grp[d.group]=(grp[d.group]||0)+(r.je_breakdown[i]||0);});
    chart=new Chart($('jechart'),{type:'doughnut',data:{labels:Object.keys(grp),datasets:[{data:Object.values(grp),
      backgroundColor:['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#0ea5e9','#14b8a6']}]},
      options:{plugins:{legend:{position:'right',labels:{boxWidth:10,font:{size:10}}}},cutout:'58%'}});
  }else{const c=$('jechart');if(c)c.replaceWith(Object.assign(document.createElement('div'),{className:'muted',style:'font-size:11.5px',textContent:'— '+PCC.t('je_rev')+' —'}));}
}
boot();
</script>
</body>
</html>
