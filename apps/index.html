<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCC People Architecture Portal</title>
<link rel="stylesheet" href="shared.css">
<style>
  .hero{background:linear-gradient(120deg,var(--navy),var(--blue));color:#fff;border-radius:16px;padding:24px 26px;margin-bottom:22px}
  .hero h1{font-size:23px;font-weight:800;margin-bottom:6px}
  .hero p{opacity:.92;font-size:13.5px}
  .hchips{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
  .hchips span{background:rgba(255,255,255,.16);border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:600}
  .mods{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:15px}
  .card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:17px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:7px;transition:.15s;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--blue)}
  .card .ic{font-size:28px}.card h3{font-size:15.5px;font-weight:800}
  .card .d{font-size:12.5px;color:var(--muted);min-height:48px}
  .card .meta{font-size:11.5px;color:var(--blue);font-weight:700}
  .badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#e6f7f0;color:var(--ok)}
  .bar2{width:100%;height:5px;border-radius:3px;background:#eef1f6;margin-top:6px;overflow:hidden}.bar2 i{display:block;height:100%}
  .st{font-size:13px;font-weight:800;color:var(--navy);margin:24px 0 10px;text-transform:uppercase;letter-spacing:.6px}
  .health{display:flex;gap:12px;flex-wrap:wrap}
  .h{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;flex:1;min-width:130px}
  .h .n{font-size:23px;font-weight:800}.h .l{font-size:11.5px;color:var(--muted)}
  .h.ok .n{color:var(--ok)}.h.warn .n{color:var(--warn)}.h.crit .n{color:var(--crit)}
  .legend{display:flex;gap:8px;flex-wrap:wrap}
  .co{display:flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:6px 11px;font-size:12px}
  .co .sw{width:13px;height:13px;border-radius:4px}
  .note{font-size:11.5px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div id="nav"></div>
<div class="wrap">
  <div class="hero">
    <h1 id="h-title"></h1><p id="h-sub"></p>
    <div class="hchips" id="hchips"></div>
  </div>
  <div class="mods" id="mods"></div>
  <div class="st" id="st-health"></div>
  <div class="health" id="health"></div>
  <div class="note" id="hnote"></div>
  <div class="st">Companies</div>
  <div class="legend" id="legend"></div>
</div>
<footer>PCC Group · Job Role Architecture · data v0.1.0-draft · <span id="src">static preview</span></footer>
<script src="shared.js"></script>
<script>
const th=PCC.lang()==='th';
const TX={
 title: th?'PCC People Architecture Portal':'PCC People Architecture Portal',
 sub: th?'Job Role Library เป็นศูนย์กลางข้อมูล — ป้อนต่อให้ Career Path และการประเมินคน · single source of truth'
        :'The Job Role Library is the data hub — feeding Career Paths and people evaluation · single source of truth',
 chips: th?['196 ตำแหน่งงาน','9 บริษัท','สายอาชีพ F1–L6','JE 30 ข้อ']:['196 Job Roles','9 Companies','F1–L6 Pipeline','JE 30-item'],
 health: th?'สถานะข้อมูล':'Data Health',
 cards:[
  ['library.html','📚','#3b82f6',100,'LIVE', th?'คลังตำแหน่งงาน':'Job Role Library', th?'JD ทั้งหมด · กรองบริษัท/ระดับ/สายงาน · เจาะ JE + KR + KPI · ป้าย JE ยืนยัน/รอทบทวน':'All JDs · filter by company/level/family · drill into JE + KR + KPI · verified/under-review badges', th?'ศูนย์กลางข้อมูล →':'data hub →'],
  ['career.html','🪜','#10b981',75,'LIVE', th?'เส้นทางเติบโต':'Career Path Explorer', th?'บันได F1→L6 ต่อสายงาน · เลื่อนระดับ · AI risk (ข้อมูลจริง 196 ตำแหน่ง)':'F1→L6 ladder per family · transitions · AI risk (real 196 roles)', th?'ต่อยอดจาก Library →':'built on Library →'],
  ['evaluate.html','🎯','#f59e0b',60,'16 CAND.', th?'ประเมินคน':'Evaluation', th?'โหมด Hiring ใช้ได้ (16 ผู้สมัคร × HCDM-L3) · radar + เทียบผู้สมัคร · Export CSV':'Hiring mode live (16 candidates × HCDM-L3) · radar + compare · CSV export', th?'engine เดียว ใช้ JD เป็นเกณฑ์ →':'one engine, JD as rubric →'],
  ['admin.html','⚙️','#8b5cf6',100,'LIVE', th?'ข้อมูล / สุขภาพระบบ':'Admin / Data Health', th?'สถานะข้อมูล · worklist JE ที่ต้องแก้ · open decisions · แนวทาง authoring':'data status · JE worklist · open decisions · authoring guide', th?'data เป็น master →':'data is master →']
 ]
};
function boot(){
  PCC.nav('index');
  document.getElementById('h-title').textContent=TX.title;
  document.getElementById('h-sub').textContent=TX.sub;
  document.getElementById('hchips').innerHTML=TX.chips.map(c=>`<span>${c}</span>`).join('');
  document.getElementById('st-health').textContent=TX.health;
  document.getElementById('mods').innerHTML=TX.cards.map(([href,ic,col,pct,badge,t,d,m])=>
    `<a class="card" href="${href}"><span class="badge">${badge}</span><div class="ic">${ic}</div><h3>${t}</h3><div class="d">${d}</div><div class="meta">${m}</div><div class="bar2"><i style="width:${pct}%;background:${col}"></i></div></a>`).join('');
  document.getElementById('health').innerHTML=
    `<div class="h ok"><div class="n" id="h-active">—</div><div class="l">${th?'ตำแหน่ง active':'active roles'}</div></div>
     <div class="h ok"><div class="n" id="h-ver">—</div><div class="l">JE verified</div></div>
     <div class="h warn"><div class="n" id="h-rev">—</div><div class="l">JE under review</div></div>
     <div class="h crit"><div class="n" id="h-crit">—</div><div class="l">${th?'flag วิกฤต':'critical flags'}</div></div>`;
  document.getElementById('hnote').textContent=th?'* อ่านสดจาก data/job_roles.json เมื่อเปิดผ่าน GitHub Pages':'* live counts from data/job_roles.json when served via GitHub Pages';
  PCC.ref().then(ref=>{
    document.getElementById('legend').innerHTML=ref.companies.map(c=>`<div class="co"><span class="sw" style="background:${c.color}"></span><b>${c.code}</b> · ${th?(c.name_th||c.name_en):c.name_en}</div>`).join('');
  }).catch(()=>{});
  fetch('../data/job_roles.json').then(r=>r.ok?r.json():null).then(d=>{
    if(!d||!d.roles)return;const R=d.roles,act=R.filter(r=>r.status==='active');
    document.getElementById('h-active').textContent=act.length;
    document.getElementById('h-ver').textContent=R.filter(r=>r.je_breakdown).length;
    document.getElementById('h-rev').textContent=R.filter(r=>!r.je_breakdown).length;
    document.getElementById('h-crit').textContent=R.filter(r=>(r.data_quality||[]).some(f=>f.severity==='critical')).length;
    document.getElementById('src').textContent='live: data/job_roles.json';
  }).catch(()=>{});
}
boot();
</script>
</body>
</html>
