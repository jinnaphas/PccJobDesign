<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluation — PCC People</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  .seg{display:inline-flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:7px 13px;font-size:12.5px}.seg button.on{background:var(--blue);color:#fff}.seg button:disabled{color:#aab;cursor:not-allowed}
  .jd{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;margin:12px 0;font-size:13px}.jd b{color:var(--navy)}
  .kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .k{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:110px}
  .k .n{font-size:22px;font-weight:800}.k .l{font-size:11px;color:var(--muted)}
  .k.good .n{color:var(--ok)}.k.mid .n{color:var(--warn)}.k.bad .n{color:var(--crit)}
  td .sel{margin-right:6px}
  .wbox{font-size:12px;color:var(--muted);background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;margin-bottom:12px}
  .wbox b{color:var(--text)}
  .li{font-size:12px;margin-left:16px;margin-bottom:3px}
</style>
</head>
<body>
<div id="nav"></div>
<div class="wrap">
  <div class="row no-print">
    <div class="seg"><button class="on">Hiring</button><button disabled title="Phase 3 — needs employee data">Gap Closing</button><button disabled title="Phase 3 — needs employee data">Promotion</button></div>
    <label>🎯 <select id="role"></select></label>
    <span class="spacer"></span>
    <button class="btn sm" id="cmpbtn" onclick="compare()">⚖️ <span id="t-cmp"></span></button>
    <button class="btn sm" onclick="exportCSV()">⬇️ <span id="t-exp"></span></button>
  </div>
  <div class="jd" id="jd"></div>
  <div class="wbox" id="wbox"></div>
  <div class="row no-print" id="recfilter" style="margin-bottom:10px"></div>
  <div class="kpis" id="kpis"></div>
  <div id="tablewrap"></div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)this.classList.remove('show')"><div class="mod" id="mod"></div></div>
<footer>PCC Group · Evaluation (Hiring)</footer>
<script src="shared.js"></script>
<script>
let REF,ROLES,MODEL,PEOPLE=[],KR={},TARGET='PCC-HR-HCDM-L3',recF=new Set(),chart;
const DIMS=['education','experience','skills','english','digital','certifications'];
const $=id=>document.getElementById(id);
const col=p=>p>=75?'#1a7f5a':p>=60?'#b87c00':'#c0392b';
async function boot(){
  PCC.nav('evaluate');
  $('t-cmp').textContent=PCC.lang()==='th'?'เทียบที่เลือก':'Compare';$('t-exp').textContent=PCC.t('exportcsv');
  try{REF=await PCC.ref();ROLES=(await (await fetch('../data/job_roles.json')).json()).roles;MODEL=await (await fetch('../data/scoring_model.json')).json();}
  catch(e){$('tablewrap').innerHTML=PCC.needLiveMsg();return;}
  const want=PCC.qs('target'); if(want)TARGET=want;
  const o=document.createElement('option');o.value='PCC-HR-HCDM-L3';o.textContent='HCD Manager (PCC-HR-HCDM-L3)';$('role').appendChild(o);
  if(TARGET!=='PCC-HR-HCDM-L3'){const r=ROLES.find(x=>x.code===TARGET);const o2=document.createElement('option');o2.value=TARGET;o2.textContent=(r?PCC.title(r):TARGET)+' ('+TARGET+')';$('role').appendChild(o2);}
  $('role').value=TARGET;$('role').onchange=()=>{TARGET=$('role').value;load();};
  // weights
  const w=MODEL.modes.hiring.weights;
  $('wbox').innerHTML=(PCC.lang()==='th'?'น้ำหนักเกณฑ์ (Hiring): ':'Scoring weights (Hiring): ')+DIMS.map(d=>`${d} <b>${w[d]||0}%</b>`).join(' · ')+` &nbsp; | เกณฑ์: Proceed ≥${MODEL.modes.hiring.thresholds.high} · Consider ≥${MODEL.modes.hiring.thresholds.mid}`;
  // rec filter chips
  ['Proceed','Consider','Not Suitable'].forEach(rc=>{const c=document.createElement('span');c.className='chip';c.textContent=rc;c.onclick=()=>{recF.has(rc)?recF.delete(rc):recF.add(rc);c.classList.toggle('on');render();};$('recfilter').appendChild(c);});
  load();
}
async function load(){
  try{const pf=await (await fetch('../data/people/candidates_'+TARGET+'.json')).json();PEOPLE=pf.people;KR=pf._meta.kr_keys||{};}
  catch(e){PEOPLE=[];KR={};}
  render();
}
function render(){
  const r=ROLES.find(x=>x.code===TARGET)||{};
  $('jd').innerHTML=`🎯 <b>${PCC.title(r)||TARGET}</b> · <span class="mono">${TARGET}</span> · ${r.level||''} · JE ${r.je_score??'—'}`+(r.purpose_th?`<br><span class="muted">${PCC.esc(r.purpose_th)}</span>`:'');
  if(!PEOPLE.length){$('kpis').innerHTML='';$('wbox').classList.add('hide');$('recfilter').classList.add('hide');
    $('tablewrap').innerHTML=`<div class="msg">${PCC.lang()==='th'?'ยังไม่มีข้อมูลผู้สมัครสำหรับตำแหน่งนี้':'No candidate data for this role yet'} · <a href="evaluate.html?target=PCC-HR-HCDM-L3">ดูตัวอย่าง HCDM-L3</a></div>`;return;}
  $('wbox').classList.remove('hide');$('recfilter').classList.remove('hide');
  const cnt={Proceed:0,Consider:0,'Not Suitable':0};PEOPLE.forEach(p=>cnt[p.evaluation.recommendation]=(cnt[p.evaluation.recommendation]||0)+1);
  $('kpis').innerHTML=`<div class="k"><div class="n">${PEOPLE.length}</div><div class="l">${PCC.lang()==='th'?'ผู้สมัคร':'candidates'}</div></div>
    <div class="k good"><div class="n">${cnt.Proceed}</div><div class="l">Proceed</div></div>
    <div class="k mid"><div class="n">${cnt.Consider}</div><div class="l">Consider</div></div>
    <div class="k bad"><div class="n">${cnt['Not Suitable']}</div><div class="l">Not Suitable</div></div>`;
  let list=PEOPLE.filter(p=>!recF.size||recF.has(p.evaluation.recommendation));
  let h=`<table><thead><tr><th></th><th>#</th><th>${PCC.lang()==='th'?'ชื่อ':'Name'}</th><th>${PCC.lang()==='th'?'ตำแหน่งปัจจุบัน':'Current'}</th><th>Exp</th><th>Overall</th><th>${PCC.lang()==='th'?'ผล':'Result'}</th></tr></thead><tbody>`;
  list.forEach((p,i)=>{const e=p.evaluation;
    h+=`<tr><td><input type="checkbox" class="sel" data-id="${p.id}"></td><td>${i+1}</td><td><b style="cursor:pointer" onclick="openP('${p.id}')">${PCC.esc(p.name)}</b></td>
    <td>${PCC.esc(p.current_title||'')}<br><span class="muted" style="font-size:11px">${PCC.esc(p.current_company||'')}</span></td>
    <td>${p.experience?.total_years||''}</td>
    <td><div class="row" style="gap:6px"><div class="bar" style="width:64px"><i style="width:${e.overall_pct}%;background:${col(e.overall_pct)}"></i></div><b>${e.overall_pct}%</b></div></td>
    <td><span class="pill ${PCC.recClass(e.recommendation)}">${e.recommendation}</span></td></tr>`;});
  h+='</tbody></table>';$('tablewrap').innerHTML=h;
}
function radarCfg(datasets,labels){return{type:'radar',data:{labels,datasets},options:{scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9}},pointLabels:{font:{size:10}}}},plugins:{legend:{labels:{boxWidth:10,font:{size:11}}}}}};}
function openP(id){
  const p=PEOPLE.find(x=>x.id===id),e=p.evaluation;
  let h=`<div class="mh" style="background:var(--navy)"><button class="close" onclick="$('ov').classList.remove('show')">×</button>
    <h2>${PCC.esc(p.name)}</h2><div style="opacity:.9;font-size:12.5px">${PCC.esc(p.current_title||'')} @ ${PCC.esc(p.current_company||'')} · ${p.education?.level||''} · ${p.experience?.total_years||''} ปี · EN ${p.languages?.english||''}</div>
    <div style="margin-top:8px"><span class="pill ${PCC.recClass(e.recommendation)}">${e.recommendation} · ${e.overall_pct}%</span></div></div><div class="mb">
    <div class="row" style="gap:14px;align-items:flex-start"><div style="flex:1;min-width:220px"><canvas id="rad1" height="220"></canvas></div><div style="flex:1;min-width:220px"><canvas id="rad2" height="220"></canvas></div></div>`;
  if(e.key_strengths?.length){h+=`<h3>${PCC.lang()==='th'?'จุดแข็ง':'Strengths'}</h3>`;e.key_strengths.forEach(s=>h+=`<div class="li">✅ ${PCC.esc(s)}</div>`);}
  if(e.key_gaps?.length){h+=`<h3>${PCC.lang()==='th'?'ช่องว่าง':'Gaps'}</h3>`;e.key_gaps.forEach(s=>h+=`<div class="li">⚠️ ${PCC.esc(s)}</div>`);}
  h+='</div>';$('mod').innerHTML=h;$('ov').classList.add('show');
  if(typeof Chart==='undefined')return;
  new Chart($('rad1'),radarCfg([{label:PCC.lang()==='th'?'คะแนน 6 มิติ':'6 dimensions',data:DIMS.map(d=>e.scores[d]||0),fill:true,backgroundColor:'rgba(46,95,158,.2)',borderColor:'#2E5F9E'}],DIMS));
  const kk=Object.keys(e.kr_alignment||{});
  new Chart($('rad2'),radarCfg([{label:'KR Alignment',data:kk.map(k=>e.kr_alignment[k]),fill:true,backgroundColor:'rgba(16,127,90,.2)',borderColor:'#1a7f5a'}],kk.map(k=>KR[k]||k)));
}
function compare(){
  const ids=[...document.querySelectorAll('.sel:checked')].map(c=>c.dataset.id).slice(0,3);
  if(ids.length<2){alert(PCC.lang()==='th'?'เลือกผู้สมัคร 2-3 คนเพื่อเทียบ':'Select 2-3 candidates to compare');return;}
  const cols=['#2E5F9E','#c0392b','#1a7f5a'];
  const ds=ids.map((id,i)=>{const e=PEOPLE.find(x=>x.id===id).evaluation;return{label:PEOPLE.find(x=>x.id===id).name,data:DIMS.map(d=>e.scores[d]||0),fill:true,backgroundColor:cols[i]+'22',borderColor:cols[i]};});
  $('mod').innerHTML=`<div class="mh" style="background:var(--navy)"><button class="close" onclick="$('ov').classList.remove('show')">×</button><h2>${PCC.lang()==='th'?'เทียบผู้สมัคร':'Compare candidates'}</h2></div><div class="mb"><canvas id="radc" height="260"></canvas><div id="ctab" style="margin-top:12px"></div></div>`;
  $('ov').classList.add('show');
  if(typeof Chart!=='undefined')new Chart($('radc'),radarCfg(ds,DIMS));
  let t='<table><thead><tr><th>'+(PCC.lang()==='th'?'ชื่อ':'Name')+'</th><th>Overall</th>'+DIMS.map(d=>`<th>${d}</th>`).join('')+'</tr></thead><tbody>';
  ids.forEach(id=>{const p=PEOPLE.find(x=>x.id===id),e=p.evaluation;t+=`<tr><td><b>${PCC.esc(p.name)}</b></td><td>${e.overall_pct}%</td>`+DIMS.map(d=>`<td>${e.scores[d]||0}</td>`).join('')+'</tr>';});
  $('ctab').innerHTML=t+'</tbody></table>';
}
function exportCSV(){
  const rows=[['Name','Current Title','Company','Total Exp','Overall %','Recommendation',...DIMS,...Object.keys(PEOPLE[0]?.evaluation.kr_alignment||{})]];
  PEOPLE.forEach(p=>{const e=p.evaluation;rows.push([p.name,p.current_title,p.current_company,p.experience?.total_years,e.overall_pct,e.recommendation,...DIMS.map(d=>e.scores[d]),...Object.values(e.kr_alignment||{})]);});
  PCC.exportCSV('candidates_'+TARGET+'.csv',rows);
}
boot();
</script>
</body>
</html>
