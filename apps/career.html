<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Path — PCC People</title>
<link rel="stylesheet" href="shared.css">
<style>
  .ctrl{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .risk{font-size:12px;font-weight:700;padding:5px 12px;border-radius:16px;color:#fff}
  .ladder{display:grid;grid-template-columns:repeat(7,minmax(120px,1fr));gap:8px;margin-bottom:18px;overflow-x:auto}
  .col{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:8px;min-height:70px}
  .col h4{font-size:11px;text-align:center;color:#fff;border-radius:6px;padding:3px;margin-bottom:6px}
  .role{font-size:11px;border:1.2px solid var(--border);border-left-width:4px;border-radius:6px;padding:5px 6px;margin-bottom:5px;background:#fafcff;cursor:pointer}
  .role:hover{background:#eef5ff;border-color:var(--blue)}
  .role b{display:block;font-size:11.5px}.role span{color:var(--muted);font-size:9.5px}
  h2{font-size:17px;color:var(--navy);margin:8px 0 12px}
  .bridge{font-size:12px;color:var(--muted);margin:6px 0 14px}.bridge b{color:var(--text)}
  .trans{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
  .tc{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:13px}
  .tc h3{font-size:13px;color:var(--blue)}.tc .tl{font-size:11px;color:var(--muted);margin:3px 0 7px}
  .tc li{font-size:12px;margin-left:16px;margin-bottom:3px}.tc .mix{font-size:11px;color:var(--muted);margin-top:7px;border-top:1px dashed var(--border);padding-top:6px}
</style>
</head>
<body>
<div id="nav"></div>
<div class="wrap">
  <div class="ctrl">
    <label id="l-fam"> <select id="fam"></select></label>
    <label id="l-co"> <select id="co"></select></label>
    <span class="risk" id="risk"></span>
  </div>
  <div id="bridge" class="bridge"></div>
  <div class="ladder" id="ladder"></div>
  <h2 id="t-trans"></h2>
  <div class="trans" id="trans"></div>
</div>
<footer>PCC Group · Career Path Explorer</footer>
<script src="shared.js"></script>
<script>
const RC={Low:'#1a7f5a',Medium:'#b87c00',High:'#c0392b'};
let REF,ROLES,OV;const $=id=>document.getElementById(id);
async function boot(){
  PCC.nav('career');
  $('l-fam').firstChild.textContent=PCC.t('family')+': ';$('l-co').firstChild.textContent=PCC.t('company')+': ';
  $('t-trans').textContent=(PCC.lang()==='th'?'เส้นทางเลื่อนระดับ (Level Transitions)':'Level Transitions');
  try{
    REF=await PCC.ref();
    ROLES=(await (await fetch('../data/job_roles.json')).json()).roles.filter(r=>r.status==='active');
    OV=await (await fetch('../data/career_overlay.json')).json();
  }catch(e){$('ladder').innerHTML=PCC.needLiveMsg();return;}
  REF.consolidated_families.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.icon+' '+f.name_en;$('fam').appendChild(o);});
  const oc=document.createElement('option');oc.value='';oc.textContent=PCC.t('allco');$('co').appendChild(oc);
  REF.companies.forEach(c=>{const o=document.createElement('option');o.value=c.code;o.textContent=c.code;$('co').appendChild(o);});
  $('fam').value=PCC.qs('family')||'hr'; if(PCC.qs('company'))$('co').value=PCC.qs('company');
  $('fam').onchange=render;$('co').onchange=render;render();
}
function render(){
  const fam=$('fam').value,co=$('co').value;
  const rs=ROLES.filter(r=>PCC.famId(r)===fam&&(!co||r.company===co));
  const ar=(OV.ai_risk||{})[fam];const rk=$('risk');
  if(ar){rk.style.background=RC[ar.label]||'#888';rk.textContent='AI Risk: '+ar.label+' — '+ar.reason;}else rk.textContent='';
  const br=((OV.bridges||{})[fam]||[]).filter(b=>b!==fam);
  $('bridge').innerHTML=br.length?'🔀 '+(PCC.lang()==='th'?'สายงานที่ข้ามไปได้: ':'Bridges to: ')+'<b>'+br.map(PCC.famName).join(' · ')+'</b>':'';
  const lad=$('ladder');lad.innerHTML='';
  PCC.LEVELS.forEach(l=>{
    const col=document.createElement('div');col.className='col';col.innerHTML=`<h4 style="background:${PCC.LC[l]}">${l}</h4>`;
    rs.filter(r=>r.level===l).forEach(r=>{
      const d=document.createElement('div');d.className='role';d.style.borderLeftColor=PCC.coColor(r.company);
      d.innerHTML=`<b>${PCC.title(r)}</b><span class="mono">${r.code} · JE ${r.je_score??'—'}</span>`;
      d.onclick=()=>location.href='library.html?role='+encodeURIComponent(r.code);
      col.appendChild(d);
    });
    lad.appendChild(col);
  });
  const present=PCC.LEVELS.filter(l=>rs.some(r=>r.level===l));
  const tr=$('trans');tr.innerHTML='';
  [['F1','L1'],['L1','L2'],['L2','L3'],['L3','L4'],['L4','L5'],['L5','L6']].forEach(([a,b])=>{
    const t=(OV.transitions||{})[a+'_'+b];if(!t)return;
    const card=document.createElement('div');card.className='tc';if(!(present.includes(a)||present.includes(b)))card.style.opacity=.5;
    let h=`<h3>${a} → ${b}</h3><div class="tl">⏱ ${t.readiness?.timeline||''}</div><ul>`;
    (t.readiness?.checklist||[]).forEach(c=>h+=`<li>${PCC.esc(c)}</li>`);h+='</ul>';
    if(t.learning_method)h+='<div class="mix">70-20-10: '+['70','20','10'].map(k=>(t.learning_method[k]||[]).join(', ')).filter(Boolean).join(' | ')+'</div>';
    card.innerHTML=h;tr.appendChild(card);
  });
}
boot();
</script>
</body>
</html>
